# YAML anchors and aliases (intra-document references)
# Note: the extractor does not emit anchor/alias edges;
# these keys are extracted as yaml_key nodes only.

defaults: &defaults
  retries: 3
  timeout: 30
  enabled: true

production:
  <<: *defaults
  host: prod.example.com
  debug: false

staging:
  <<: *defaults
  host: staging.example.com
  debug: true
