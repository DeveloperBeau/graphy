<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="graphy">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <mask id="mouth">
      <rect width="256" height="256" fill="#fff"/>
      <!-- cut the G's mouth on the right -->
      <rect x="132" y="106" width="100" height="44" fill="#000"/>
    </mask>
  </defs>

  <!-- rounded purple tile -->
  <rect width="256" height="256" rx="56" fill="url(#tile)"/>

  <!-- G ring: a thick circle with the right-middle masked away -->
  <g mask="url(#mouth)">
    <circle cx="128" cy="128" r="66" fill="none" stroke="#F5F3FF" stroke-width="28"/>
  </g>

  <!-- G spur: the inner bar reaching into the mouth -->
  <rect x="150" y="114" width="48" height="28" rx="8" fill="#F5F3FF"/>

  <!-- graph-node accent: the spur terminates in a node, ringed in purple -->
  <circle cx="150" cy="128" r="17" fill="#F5F3FF"/>
  <circle cx="150" cy="128" r="8" fill="#6D28D9"/>
</svg>
